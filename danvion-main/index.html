<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon-32x32.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Performance: preconnect and dns-prefetch -->
    <link rel="preconnect" href="https://danvion.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5, user-scalable=yes"
    />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Danvion - Leading provider of Edge AI solutions, embedded systems, and complete product development services from concept to production."
    />
    <meta
      name="keywords"
      content="Edge AI, AI solutions, embedded systems, product development, IoT, machine learning"
    />
    <meta name="author" content="Danvion Ltd." />
    <meta name="theme-color" content="#000000" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Danvion" />

    <!-- Open Graph Tags -->
    <meta property="og:site_name" content="Danvion" />
    <meta property="og:locale" content="en_US" />

    <!-- Verification Tags -->
    <meta name="google-site-verification" content="" />
    <meta name="msvalidate.01" content="" />

    <!-- Performance optimizations -->
    <!-- Prefetch sitemap and robots -->
    <link rel="prefetch" href="/sitemap.xml" />

    <!-- Google Analytics 4 (deferred to avoid blocking critical rendering) -->
    <script type="module">
      // Load GA after page is fully loaded to optimize Core Web Vitals
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      window.addEventListener("load", function () {
        setTimeout(function () {
          const measurementId = import.meta.env.VITE_GA_MEASUREMENT_ID;
          if (!measurementId) return;

          const script = document.createElement("script");
          script.src =
            "https://www.googletagmanager.com/gtag/js?id=" + measurementId;
          script.async = true;
          script.defer = true;
          script.onload = function () {
            gtag("config", measurementId, {
              page_path: window.location.pathname,
            });
          };
          document.head.appendChild(script);
        }, 2000);
      });
    </script>

    <title>Danvion - Edge AI Solutions & Product Development</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker registration for caching -->
    <script>
      window.addEventListener("load", async () => {
        if (!("serviceWorker" in navigator)) {
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const shouldClearServiceWorker = params.has("clear-sw");
        const shouldDisableServiceWorker =
          params.has("no-sw") || window.location.hash.includes("no-sw");

        if (shouldClearServiceWorker) {
          try {
            const registrations =
              await navigator.serviceWorker.getRegistrations();
            await Promise.all(
              registrations.map((registration) => registration.unregister()),
            );

            if ("caches" in window) {
              const cacheKeys = await caches.keys();
              await Promise.all(
                cacheKeys.map((cacheKey) => caches.delete(cacheKey)),
              );
            }
          } catch {
            // Silently fail if cleanup is blocked by the browser.
          }
        }

        if (shouldDisableServiceWorker) {
          return;
        }

        navigator.serviceWorker.register("/sw.js").catch(() => {
          // Silently fail if service worker registration fails
        });
      });
    </script>
  </body>
</html>
